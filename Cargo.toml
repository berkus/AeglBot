[workspace]
members = ["bot", "entity", "migration"]
resolver = "2"

[workspace.dependencies]
anyhow = "1"
dotenv = "0.15"
entity = { version = "0.4", path = "./entity" }
fern = { version = "0.7", features = ["colored"] }
futures = "0.3"
futures-retry = "0.6"
include_dir = { version = "0.7.4", features = ["glob", "metadata", "nightly"] }
itertools = "0.14"
log = "0.4"
migration = { version = "0.4", path = "./migration" }
paste = "1"
# plurals = "0.3"
regex = "1"
riker = "0.4"
sea-orm = { version = "1.1", features = [
    "macros",
    "runtime-tokio-rustls",
    "sqlx-postgres",
    "with-time",
] }
sea-orm-migration = { version = "1.1", features = [
    "runtime-tokio-rustls",
    "sqlx-postgres",
    "with-time",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
teloxide = { version = "0.13", features = ["macros"] }
time = "0.3"
time-tz = "3.0.0-rc.5.0.0"
two_timer = "2.2"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tokio-util = { version = "0.7", features = ["codec"] }
tera = "1"
